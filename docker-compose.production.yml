# PickleFund V2.0 — Production Docker Compose
#
# USAGE (required — loads .env.production for variable interpolation):
#   docker compose --env-file .env.production -f docker-compose.production.yml build
#   docker compose --env-file .env.production -f docker-compose.production.yml up -d
#   docker compose --env-file .env.production -f docker-compose.production.yml ps
#   docker compose --env-file .env.production -f docker-compose.production.yml logs -f
#
# The --env-file flag is required so that ${POSTGRES_PASSWORD}, ${REDIS_PASSWORD},
# ${VITE_API_URL} etc. are interpolated correctly from .env.production.
# Without it, Docker Compose would look for a .env file (not .env.production).
#
# SETUP:
#   cp .env.production.example .env.production
#   # Edit .env.production with real values
#   docker compose --env-file .env.production -f docker-compose.production.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: picklefund-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-picklefund}
      POSTGRES_USER: ${POSTGRES_USER:-picklefund}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - picklefund-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-picklefund} -d ${POSTGRES_DB:-picklefund}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: picklefund-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis}
    volumes:
      - redis_data:/data
    networks:
      - picklefund-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-changeme_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: picklefund-api
    restart: always
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - picklefund-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: picklefund-web
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - picklefund-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: picklefund-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - picklefund-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_webroot:
    driver: local

networks:
  picklefund-network:
    driver: bridge
