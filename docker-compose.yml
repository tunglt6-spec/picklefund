version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: picklefund-db
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [picklefund-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: picklefund-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes: [redisdata:/data]
    networks: [picklefund-net]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: picklefund-api
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [picklefund-net]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: picklefund-app
    networks: [picklefund-net]
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: picklefund-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on: [backend, frontend]
    networks: [picklefund-net]
    restart: unless-stopped

networks:
  picklefund-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  nginx-logs:
