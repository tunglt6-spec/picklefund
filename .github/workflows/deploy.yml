name: Deploy PickleFund

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        run: cd backend && npm ci
      - name: Run backend tests
        run: cd backend && npm test -- --passWithNoTests

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIT_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 30m
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_CHAT_ID,GIT_SHA
          script: |
            set -e
            REPO_DIR=/opt/picklefund
            SHORT_SHA="${GIT_SHA:0:7}"

            # ── Telegram helper (silent if secrets not configured) ─────
            send_telegram() {
              local msg="$1"
              if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
                curl -s -X POST \
                  "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                  --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
                  --data-urlencode "text=${msg}" \
                  -d "parse_mode=HTML" \
                  >/dev/null 2>&1 || true
              fi
            }

            cd "$REPO_DIR"

            # ── 1. Save previous commit for rollback ──────────────────
            PREVIOUS_COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "")
            echo "Previous commit: ${PREVIOUS_COMMIT:-none}"
            echo "$PREVIOUS_COMMIT" > /tmp/picklefund-last-commit.txt

            send_telegram "$(printf '🚀 PickleFund deploy started\nCommit: %s' "$SHORT_SHA")"

            # ── 2. Sync to origin/main (no git pull) ──────────────────
            git fetch origin main
            TARGET_SHA=$(git rev-parse origin/main)
            echo "Target commit: $TARGET_SHA"
            git reset --hard origin/main
            git clean -fd \
              -e .env \
              -e .env.production \
              -e "*.sql" \
              -e "backup_*.sql" \
              -e "ssl/"

            # ── 3. Load production env vars for DB credentials ────────
            set -a
            [ -f "$REPO_DIR/.env.production" ] && source "$REPO_DIR/.env.production"
            [ -f "$REPO_DIR/.env" ]            && source "$REPO_DIR/.env"
            set +a

            # ── 4. Database backup before any container change ────────
            mkdir -p "$REPO_DIR/backups"
            BACKUP_FILE="$REPO_DIR/backups/picklefund_$(date +%Y%m%d_%H%M%S).sql"

            echo "Creating database backup: $BACKUP_FILE"
            docker compose exec -T postgres pg_dump \
              -U "$POSTGRES_USER" \
              -d "$POSTGRES_DB" \
              > "$BACKUP_FILE"

            if [ ! -s "$BACKUP_FILE" ]; then
              echo "ERROR: Backup file is empty or missing — aborting deploy."
              rm -f "$BACKUP_FILE"
              send_telegram "$(printf '🚨 PickleFund deploy aborted\nDatabase backup failed.\nManual intervention required.')"
              exit 1
            fi
            BACKUP_SIZE=$(du -sh "$BACKUP_FILE" | cut -f1)
            echo "Backup OK: $(basename "$BACKUP_FILE") ($BACKUP_SIZE)"

            # ── 5. Build & restart ────────────────────────────────────
            docker compose build --no-cache
            docker compose down --remove-orphans
            docker compose up -d

            echo "Waiting for services to initialize..."
            sleep 30

            # ── 6. Health checks ──────────────────────────────────────
            HEALTH_OK=true

            if ! curl -sf https://api.picklefund.uk/health >/dev/null 2>&1; then
              echo "ERROR: Backend health check failed"
              docker compose ps
              docker compose logs backend --tail=100
              HEALTH_OK=false
            fi

            if [ "$HEALTH_OK" = "true" ]; then
              if ! curl -sf https://app.picklefund.uk/ >/dev/null 2>&1; then
                echo "ERROR: Frontend health check failed"
                docker compose ps
                docker compose logs nginx --tail=100
                HEALTH_OK=false
              fi
            fi

            # ── 7. Success ────────────────────────────────────────────
            if [ "$HEALTH_OK" = "true" ]; then
              BACKUP_NAME=$(basename "$BACKUP_FILE")
              send_telegram "$(printf '✅ PickleFund deploy success\nCommit: %s\nAPI: OK\nFrontend: OK\nBackup: %s' "$SHORT_SHA" "$BACKUP_NAME")"
              echo "Deployment successful."
              exit 0
            fi

            # ── 8. Rollback ───────────────────────────────────────────
            echo "Health check failed — initiating rollback to $PREVIOUS_COMMIT"
            send_telegram "$(printf '⚠️ PickleFund deploy failed, rolling back...\nFailed commit: %s\nRolling back to: %s' "$SHORT_SHA" "${PREVIOUS_COMMIT:0:7}")"

            if [ -z "$PREVIOUS_COMMIT" ]; then
              echo "ERROR: No previous commit recorded — cannot rollback."
              send_telegram "$(printf '🚨 PickleFund deploy failed, rollback failed\nNo previous commit recorded.\nManual intervention required.')"
              exit 1
            fi

            git reset --hard "$PREVIOUS_COMMIT"
            docker compose build --no-cache
            docker compose down --remove-orphans
            docker compose up -d
            sleep 30

            ROLLBACK_OK=true
            curl -sf https://api.picklefund.uk/health >/dev/null 2>&1 || ROLLBACK_OK=false
            curl -sf https://app.picklefund.uk/ >/dev/null 2>&1      || ROLLBACK_OK=false

            if [ "$ROLLBACK_OK" = "true" ]; then
              send_telegram "$(printf '⚠️ PickleFund deploy failed, rollback success\nFailed commit: %s\nRolled back to: %s' "$SHORT_SHA" "${PREVIOUS_COMMIT:0:7}")"
              echo "Rollback successful."
            else
              send_telegram "$(printf '🚨 PickleFund deploy failed, rollback failed\nManual intervention required.')"
              echo "CRITICAL: Rollback also failed. Manual intervention required."
            fi

            exit 1
