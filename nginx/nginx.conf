worker_processes auto;
events { worker_connections 1024; }

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  # Cloudflare real IP
  set_real_ip_from 103.21.244.0/22;
  set_real_ip_from 103.22.200.0/22;
  set_real_ip_from 103.31.4.0/22;
  set_real_ip_from 104.16.0.0/13;
  set_real_ip_from 104.24.0.0/14;
  set_real_ip_from 108.162.192.0/18;
  set_real_ip_from 131.0.72.0/22;
  set_real_ip_from 141.101.64.0/18;
  set_real_ip_from 162.158.0.0/15;
  set_real_ip_from 172.64.0.0/13;
  set_real_ip_from 173.245.48.0/20;
  set_real_ip_from 188.114.96.0/20;
  set_real_ip_from 190.93.240.0/20;
  set_real_ip_from 197.234.240.0/22;
  set_real_ip_from 198.41.128.0/17;
  real_ip_header CF-Connecting-IP;

  # Skip rate limiting for CORS preflight requests
  map $request_method $rate_limit_key {
    OPTIONS "";
    default $binary_remote_addr;
  }

  limit_req_zone $rate_limit_key zone=api:10m rate=60r/m;
  limit_req_zone $rate_limit_key zone=auth:10m rate=10r/m;
  limit_req_status 429;

  upstream backend { server backend:3000; }
  upstream frontend { server frontend:80; }

  # HTTP -> HTTPS redirect
  server {
    listen 80;
    server_name api.picklefund.uk app.picklefund.uk;
    return 301 https://$host$request_uri;
  }

  # API server
  server {
    listen 443 ssl;
    server_name api.picklefund.uk;
    ssl_certificate /etc/nginx/ssl/picklefund.crt;
    ssl_certificate_key /etc/nginx/ssl/picklefund.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location / {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }
  }

  # App server
  server {
    listen 443 ssl;
    server_name app.picklefund.uk;
    ssl_certificate /etc/nginx/ssl/picklefund.crt;
    ssl_certificate_key /etc/nginx/ssl/picklefund.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.picklefund.uk wss://api.picklefund.uk; font-src 'self' data:; worker-src 'self';" always;

    location / {
      proxy_pass http://frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
