server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Never cache index.html and service worker — must always be fresh
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }

  # Vite hashed assets (e.g. assets/index-abc123.js) — safe to cache forever
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
